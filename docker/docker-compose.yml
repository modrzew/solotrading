services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "3000:3000"
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql://solotrading:solotrading@db:5432/solotrading
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17
    environment:
      POSTGRES_USER: solotrading
      POSTGRES_PASSWORD: solotrading
      POSTGRES_DB: solotrading
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solotrading"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
